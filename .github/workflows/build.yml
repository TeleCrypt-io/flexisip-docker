name: build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'versions.env'
      - 'docker/**'
      - '.github/workflows/build.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: telecrypt-io

permissions:
  contents: read
  packages: write

jobs:
  # -------------------------------------------------------------------------
  # Build .deb packages and publish to GitHub Releases as a bonus artifact
  # for non-Docker users. The Docker images do NOT consume these.
  # Only runs when versions.env has been modified.
  # -------------------------------------------------------------------------
  build-debs:
    name: build .deb packages (bonus)
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.modified, 'versions.env')
    steps:
      - name: Checkout meta-repo
        uses: actions/checkout@v4

      - name: Read versions.env
        id: vars
        run: |
          set -euo pipefail
          . ./versions.env
          {
            echo "flexisip=${FLEXISIP_VERSION}"
            echo "conference=${FLEXISIP_CONFERENCE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ccache cmake ninja-build git python3 python3-pystache python3-six \
            doxygen elfutils gcc-14 g++-14 clang-20 llvm make yasm dpkg-dev \
            libsystemd-dev libssl-dev libboost-dev libboost-system-dev \
            libboost-thread-dev libcpp-jwt-dev libhiredis-dev libjansson-dev \
            libjsoncpp-dev libsqlite3-dev libpq-dev libmariadb-dev \
            libmariadb-dev-compat libnghttp2-dev libsnmp-dev libxerces-c-dev \
            libsrtp2-dev libgsm1-dev libopus-dev libmbedtls-dev libspeex-dev \
            libspeexdsp-dev libxml2-dev libvpx-dev

      - name: Build libnghttp2_asio 1.51.0
        run: |
          version=1.51.0
          srcdir=nghttp2-${version}
          srcpkg=${srcdir}.tar.gz
          bindir=build_libnghttp2_asio
          wget -q "https://github.com/nghttp2/nghttp2/releases/download/v${version}/${srcpkg}"
          tar -xf "${srcpkg}"
          cmake -S "${srcdir}" -B "${bindir}" -GNinja -DENABLE_ASIO_LIB=ON
          sudo cmake --build "${bindir}" --target install
          rm -rf "${srcpkg}" "${srcdir}" "${bindir}"

      - name: Clone flexisip at pinned tag
        run: |
          . ./versions.env
          rm -rf src-proxy
          git clone --depth 1 --branch "${FLEXISIP_VERSION}" \
            https://gitlab.linphone.org/BC/public/flexisip.git src-proxy
          cd src-proxy
          git submodule update --init --recursive

      - name: Configure ccache (proxy)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-proxy-${{ steps.vars.outputs.flexisip }}
          restore-keys: ${{ runner.os }}-ccache-proxy-

      - name: Build proxy .deb
        working-directory: src-proxy
        run: |
          export CC=gcc-14
          export CXX=g++-14
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/opt/belledonne-communications \
            -DSYSCONF_INSTALL_DIR=/etc \
            -DFLEXISIP_SYSTEMD_INSTALL_DIR=/usr/lib/systemd/system \
            -DCPACK_GENERATOR=DEB \
            -DENABLE_G729=ON \
            ..
          cmake --build . --target package

      - name: Clone flexisip-conference at pinned tag
        run: |
          . ./versions.env
          rm -rf src-conf
          git clone --depth 1 --branch "${FLEXISIP_CONFERENCE_VERSION}" \
            https://gitlab.linphone.org/BC/public/flexisip-conference.git src-conf
          cd src-conf
          git submodule update --init --recursive

      - name: Configure ccache (conference)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-conference-${{ steps.vars.outputs.conference }}
          restore-keys: ${{ runner.os }}-ccache-conference-

      - name: Build conference .deb
        working-directory: src-conf
        run: |
          export CC=gcc-14
          export CXX=g++-14
          mkdir build && cd build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/opt/belledonne-communications/flexisip-conference \
            -DFLEXISIP_SYSTEMD_INSTALL_DIR=/usr/lib/systemd/system \
            -DLOGROTATE_DIR=/etc/logrotate.d \
            -DCPACK_GENERATOR=DEB \
            -DENABLE_G729=ON \
            -DENABLE_EKT_SERVER=ON \
            ..
          cmake --build . --target package

      - name: Create GitHub Release with .deb artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flexisip-${{ steps.vars.outputs.flexisip }}_conference-${{ steps.vars.outputs.conference }}
          name: "flexisip ${{ steps.vars.outputs.flexisip }} + flexisip-conference ${{ steps.vars.outputs.conference }}"
          body: |
            Automated release of `flexisip` and `flexisip-conference` .deb packages.

            - **flexisip**: `${{ steps.vars.outputs.flexisip }}`
            - **flexisip-conference**: `${{ steps.vars.outputs.conference }}`

            These are the same binaries that ship in the Docker images:
            - `ghcr.io/telecrypt-io/flexisip-proxy:${{ steps.vars.outputs.flexisip }}`
            - `ghcr.io/telecrypt-io/flexisip-conference:${{ steps.vars.outputs.conference }}`

            Install on Ubuntu 24.04 (with the runtime dependencies from the .deb's `Depends:` already satisfied):

            ```bash
            sudo apt install -y ./bc-flexisip_${{ steps.vars.outputs.flexisip }}-*_amd64.deb
            sudo apt install -y ./bc-flexisip-conference_${{ steps.vars.outputs.conference }}-*_amd64.deb \
                                ./bc-flexisip-conference-plugin-ektserver_${{ steps.vars.outputs.conference }}-*_amd64.deb
            ```
          files: |
            src-proxy/build/*.deb
            src-conf/build/*.deb
          fail_on_unmatched_files: false

  # -------------------------------------------------------------------------
  # Build & push proxy image (multi-stage Dockerfile, no .deb input)
  # -------------------------------------------------------------------------
  build-proxy-image:
    name: build & push proxy image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout meta-repo
        uses: actions/checkout@v4

      - name: Read versions.env
        id: vars
        run: |
          set -euo pipefail
          . ./versions.env
          echo "FLEXISIP_VERSION=${FLEXISIP_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/flexisip-proxy
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.FLEXISIP_VERSION }}
          labels: |
            org.opencontainers.image.title=flexisip-proxy
            org.opencontainers.image.description=SIP proxy (unofficial community build) for TeleCrypt-io
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.source=https://github.com/TeleCrypt-io/flexisip-docker
            org.opencontainers.image.vendor=TeleCrypt-io

      - name: Build & push proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/proxy/Dockerfile
          build-args: FLEXISIP_VERSION=${{ env.FLEXISIP_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Build & push conference image (multi-stage Dockerfile, no .deb input)
  # -------------------------------------------------------------------------
  build-conference-image:
    name: build & push conference image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout meta-repo
        uses: actions/checkout@v4

      - name: Read versions.env
        id: vars
        run: |
          set -euo pipefail
          . ./versions.env
          echo "FLEXISIP_CONFERENCE_VERSION=${FLEXISIP_CONFERENCE_VERSION}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/flexisip-conference
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.FLEXISIP_CONFERENCE_VERSION }}
          labels: |
            org.opencontainers.image.title=flexisip-conference
            org.opencontainers.image.description=Conference server (unofficial community build) for TeleCrypt-io, with EKT plugin for E2EE
            org.opencontainers.image.licenses=AGPL-3.0
            org.opencontainers.image.source=https://github.com/TeleCrypt-io/flexisip-docker
            org.opencontainers.image.vendor=TeleCrypt-io

      - name: Build & push conference image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/conference/Dockerfile
          build-args: FLEXISIP_CONFERENCE_VERSION=${{ env.FLEXISIP_CONFERENCE_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Smoke test the just-built images
  # -------------------------------------------------------------------------
  smoke-test:
    name: smoke test images
    runs-on: ubuntu-24.04
    needs: [build-proxy-image, build-conference-image]
    if: success()
    steps:
      - name: Checkout meta-repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read versions
        id: vars
        run: |
          set -euo pipefail
          . ./versions.env
          {
            echo "flexisip=${FLEXISIP_VERSION}"
            echo "conference=${FLEXISIP_CONFERENCE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Pull proxy image
        env:
          FLEXISIP_VERSION: ${{ steps.vars.outputs.flexisip }}
        run: |
          set -euo pipefail
          docker pull "ghcr.io/telecrypt-io/flexisip-proxy:${FLEXISIP_VERSION}"
          echo "proxy image OCI labels:"
          docker inspect "ghcr.io/telecrypt-io/flexisip-proxy:${FLEXISIP_VERSION}" \
            --format '{{json .Config.Labels}}' | jq .
          echo "proxy image entrypoint:"
          docker inspect "ghcr.io/telecrypt-io/flexisip-proxy:${FLEXISIP_VERSION}" \
            --format '{{json .Config.Entrypoint}}'
          echo "proxy image cmd:"
          docker inspect "ghcr.io/telecrypt-io/flexisip-proxy:${FLEXISIP_VERSION}" \
            --format '{{json .Config.Cmd}}'

      - name: Pull conference image and verify EKT plugin
        env:
          CONFERENCE_VERSION: ${{ steps.vars.outputs.conference }}
        run: |
          set -euo pipefail
          docker pull "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}"
          echo "conference image OCI labels:"
          docker inspect "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
            --format '{{json .Config.Labels}}' | jq .
          echo "conference image entrypoint:"
          docker inspect "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
            --format '{{json .Config.Entrypoint}}'

          # EKT plugin must be present at the upstream's install layout.
          # The target OUTPUT_NAME is "linphone_ektserver", so CMake installs
          # it as "liblinphone_ektserver.so" (with the standard "lib" prefix).
          PLUGIN_DIR="/opt/belledonne-communications/flexisip-conference/lib/liblinphone/plugins"
          echo "looking for EKT plugin in: $PLUGIN_DIR"
          found=$(docker run --rm \
              "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
              sh -c "ls -1 $PLUGIN_DIR 2>/dev/null | grep -E 'ektserver.*\.so$' || true")
          if [ -z "$found" ]; then
            echo "FAIL: no *ektserver*.so found in $PLUGIN_DIR" >&2
            echo "Contents of $PLUGIN_DIR:" >&2
            docker run --rm \
                "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
                ls -la "$PLUGIN_DIR" >&2 || true
            exit 1
          fi
          echo "OK: EKT plugin present: $found"

          # Entrypoint must be executable.
          if ! docker run --rm \
              "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
              test -x /usr/local/bin/entrypoint.sh; then
            echo "FAIL: entrypoint.sh not executable" >&2
            exit 1
          fi
          echo "OK: entrypoint.sh is executable"

          # Smoke-run the entrypoint (no config mounted) so we can see the log
          # in the Actions UI.
          echo "--- entrypoint run output ---"
          docker run --rm \
              "ghcr.io/telecrypt-io/flexisip-conference:${CONFERENCE_VERSION}" \
              true 2>&1 || true

  # -------------------------------------------------------------------------
  # Publish state/built.json on full success.
  # -------------------------------------------------------------------------
  publish-state:
    name: publish state/built.json
    runs-on: ubuntu-24.04
    needs: [build-proxy-image, build-conference-image, smoke-test]
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout meta-repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read versions.env
        id: vars
        run: |
          set -euo pipefail
          . ./versions.env
          {
            echo "flexisip=${FLEXISIP_VERSION}"
            echo "conference=${FLEXISIP_CONFERENCE_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Update state/built.json
        run: |
          set -euo pipefail
          flexisip="${{ steps.vars.outputs.flexisip }}"
          conference="${{ steps.vars.outputs.conference }}"

          # Merge into existing state: keep keys that are not updated this run,
          # overwrite keys we just built.
          current="$(cat state/built.json 2>/dev/null || echo '{}')"
          echo "$current" | jq --arg f "$flexisip" --arg c "$conference" \
            '.flexisip = $f | ."flexisip-conference" = $c' \
            > state/built.json.new
          mv state/built.json.new state/built.json

          echo "New state/built.json:"
          cat state/built.json

      - name: Commit state/built.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "state: record built versions (${{ steps.vars.outputs.flexisip }} / ${{ steps.vars.outputs.conference }})"
          file_pattern: state/built.json

# flexisip-conference.conf — configuration for the Flexisip conference server.
# Replace <SIP_IP> with your server's public IP, then deploy.
#
# E2EE is ENABLED BY DEFAULT in this file: the [conference-server] section below
# ships audio-engine-mode=sfu, video-engine-mode=sfu, encryption=zrtp. The
# conference entrypoint does NOT rewrite this file — what you see is what runs.
# ENABLE_EKT_SERVER in .env is only an intent signal (see .env notes).

[global]
# Domain this conference server belongs to. Must match the proxy's host/domain.
# host=sip.example.com
# Logging
log-level=message

# ------------------------------------------------------------------
# Conference server
# ------------------------------------------------------------------
[conference-server]
# The conference server runs on host networking and listens on loopback.
# The host-networked proxy reaches it at 127.0.0.1:6064.
# Transport MUST be UDP (sip:) — flexisip 2.6 does not accept a "tcp:" prefix
# in the proxy's transports, so a TCP contact cannot be delivered. Use sip:/sips: only.
transport=sip:127.0.0.1:6064;transport=udp

# Comma-separated list of factory URIs clients use to create new conferences.
# This implicitly defines the SIP domains managed by the conference server.
conference-factory-uris=sip:conference-factory@<SIP_IP>

# Template focus URIs used when conferences are created via the factory.
# A 'conf-id' URI parameter is appended at runtime to make each focus unique.
conference-focus-uris=sip:conference-focus@<SIP_IP>

# Address of the proxy to send requests through.  Both run on host networking,
# so loopback is used (host.docker.internal does not resolve under host networking).
outbound-proxy=sips:127.0.0.1:5061;transport=tls

# Media types offered in conferences.
supported-media-types=audio video text

# Capability check: ensure clients indicate +org.linphone.specs contact parameter
# before they are invited. Leave enabled for the official Linphone clients.
check-capabilities=true

# ----- Engine mode (E2EE) ---------------------------------------------
# End-to-end encrypted group conferences: SFU engine + ZRTP media encryption.
# Ships enabled by default. The conference entrypoint no longer rewrites this
# file. To DISABLE E2EE, comment out the three lines below (media then travels
# unencrypted and flexisip raises NO error — verify after changing).
audio-engine-mode=sfu
video-engine-mode=sfu
encryption=zrtp
# ----------------------------------------------------------------------

# Database: MariaDB/MySQL for chatroom and conference state.
# The schema is created automatically if the database is empty.
database-backend=mysql
# Host is 127.0.0.1 because under host networking the "mariadb" service name
# does not resolve. MariaDB is published on loopback in docker-compose.yml.
database-connection-string=db='flexisip_conference' user='flexisip_conference' password='flexisip' host='127.0.0.1'

# Registrar backend: the conference server queries the proxy's registrar
# to discover participant devices. Must use Redis in single-proxy deployments.
[module::Registrar]
db-implementation=redis
# 127.0.0.1: Redis is published on loopback and the conference runs on host networking.
redis-server-domain=127.0.0.1
redis-server-port=6379
# redis-auth-password=CHANGEME
# redis-server-encryption=1
# redis-trusted-ca-certs=/etc/ssl/certs/ca-certificates.crt

# Authorization — suppress the "auth-domains-mode=legacy" deprecation warning
# on startup (mirrors the proxy config).
[module::Authorization]
enabled=false
auth-domains-mode=static
auth-domains=<SIP_IP>

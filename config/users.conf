version:1
test@<SIP_IP> clrtxt:test1234 ;

# ===========================================================================
# Format (MUST match exactly):
#   version:1          <- MUST be the FIRST line of this file (no comments
#                         or blank lines before it, or parsing fails)
#   <user>@<domain> <algo>:<password> ;
#
# Rules:
#   - The " ;" (space-semicolon) terminator is MANDATORY on each line
#   - Multiple algo:value pairs can appear before the " ;"
#   - Supported algorithms: clrtxt (plaintext), md5, sha256
#   - Comments are only allowed AFTER the credential lines
#
# MD5 hash = md5("<user>:<domain>:<password>") in hex
# See https://wiki.linphone.org/xwiki/wiki/public/view/Flexisip/Configuration/Authentication/

# docker-compose.yml — self-hosted E2EE-capable Flexisip deployment
# with automatic Let's Encrypt IP-certificate provisioning via lego.
#
# Adjust:
#   - SIP_IP: public IP address of this host (used for TLS + ACME)
#   - TURN_PUBLIC_IP, TURN_USER, TURN_PASSWORD: coturn credentials
#
# Port requirements:
#   - Port 80/tcp must be reachable from the Internet on SIP_IP
#     (used by Let's Encrypt HTTP-01 challenge)
#   - Port 5061/tcp+udp for SIP TLS signaling, 5060/udp for the internal
#     proxy→conference UDP hop (host network)
#   - Ports 3478, 5349, 49152-49200 for TURN/STUN relay
#
# First run:
#   Edit .env (already in repo) — set SIP_IP, TURN credentials
#   docker compose up -d
#   docker compose logs -f acme proxy conference

services:
  # ---------------------------------------------------------------------------
  # ACME sidecar — fetches and renews an IP-address TLS certificate from
  # Let's Encrypt via HTTP-01 challenge.  Writes cert.pem + privkey.pem
  # into the shared flexisip_certs volume.  The proxy reads them and
  # auto-reloads every 1 minute (tls-certificates-check-interval=60).
  #
  # Let's Encrypt IP certs:
  #   - Short-lived (~6 days), renewed automatically by lego run
  #   - Only HTTP-01 challenge (no DNS-01 for IP certs)
  #   - Port 80 must be reachable from the Internet
  # ---------------------------------------------------------------------------
  acme:
    image: goacme/lego:v5.2.2
    container_name: flexisip-acme
    restart: unless-stopped
    network_mode: host
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        IP="$${SIP_IP:?SIP_IP is required}"
        DIR=/etc/lego
        CERT_DIR=/certs

        # ── Initial certificate request ──────────────────────────────────
        fetch_cert() {
          echo "==> Requesting IP certificate for $$IP ..."
          lego run \
            --accept-tos \
            --http \
            --http.address ":80" \
            --path "$$DIR" \
            --domains "$$IP"

          # Copy into the shared volume for the proxy to pick up
          cp "$$DIR/certificates/$$IP.crt"  "$$CERT_DIR/cert.pem"
          cp "$$DIR/certificates/$$IP.key"  "$$CERT_DIR/privkey.pem"
          echo "==> Certificate installed into $$CERT_DIR"
        }

        # ── Renewal loop ─────────────────────────────────────────────────
        renew_cert() {
          echo "==> Attempting renewal for $$IP ..."
          lego run \
            --accept-tos \
            --http \
            --http.address ":80" \
            --path "$$DIR" \
            --domains "$$IP" && {
            cp "$$DIR/certificates/$$IP.crt"  "$$CERT_DIR/cert.pem"
            cp "$$DIR/certificates/$$IP.key"  "$$CERT_DIR/privkey.pem"
            echo "==> Renewed and installed new certificate"
          } || echo "==> Renewal not yet due, continuing"
        }

        # First run
        fetch_cert || true

        # Continuous renewal loop (every 12 hours, check if renewal needed)
        while true; do
          sleep 43200
          renew_cert || true
        done
    environment:
      - SIP_IP=${SIP_IP:?Set SIP_IP in .env}
    volumes:
      - flexisip_certs:/certs
    healthcheck:
      test: ["CMD", "test", "-f", "/certs/cert.pem"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

  # ---------------------------------------------------------------------------
  # SIP Proxy
  # ---------------------------------------------------------------------------
  proxy:
    image: ghcr.io/telecrypt-io/flexisip-proxy:latest
    container_name: flexisip-proxy
    restart: unless-stopped
    network_mode: host
    # SYS_RESOURCE lets the proxy raise RLIMIT_NOFILE (harmless warning otherwise).
    cap_add:
      - SYS_RESOURCE
    environment:
      - SIP_IP=${SIP_IP:-203.0.113.10}
    volumes:
      - flexisip_certs:/etc/flexisip/tls:ro
      - ./config/flexisip.conf:/etc/flexisip/flexisip.conf:ro
      - ./config/users.conf:/etc/flexisip/users.conf:ro
      - ./config/domain-registrations.conf:/etc/flexisip/domain-registrations.conf:ro
      - proxy_data:/var/opt/belledonne-communications
    depends_on:
      acme:
        condition: service_healthy
    # Host network so the proxy owns the public SIP TLS port (5061).
    # If you cannot use host networking, expose 5061/tcp+udp instead and
    # set the global "nat-addresses" to the host's public IP.
    healthcheck:
      # TCP check on the SIP TLS port (host-networked, reachable on loopback).
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/5061'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Conference server
  # ---------------------------------------------------------------------------
  conference:
    image: ghcr.io/telecrypt-io/flexisip-conference:latest
    container_name: flexisip-conference
    restart: unless-stopped
    # Host network: the conference server listens on 127.0.0.1:6064 and the
    # proxy (also host network) can reach it via loopback. Under host networking
    # Docker service names do NOT resolve, so the config points MariaDB/Redis at
    # 127.0.0.1 (both are published on loopback below).
    network_mode: host
    # SYS_RESOURCE lets the conference server raise RLIMIT_NOFILE (harmless warning otherwise).
    cap_add:
      - SYS_RESOURCE
    environment:
      # Set to "true" to enable true end-to-end encrypted conferences.
      # Requires the EKT plugin (already installed in the image) and configures
      # the conference server in SFU mode with ZRTP media encryption.
      - ENABLE_EKT_SERVER=${ENABLE_EKT_SERVER:-false}
    volumes:
      - ./config/flexisip-conference.conf:/etc/opt/belledonne-communications/flexisip-conference/flexisip-conference.conf
      - conference_data:/var/opt/belledonne-communications
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # UDP check on the conference server's loopback control/transport port.
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat < /dev/null > /dev/udp/127.0.0.1/6064'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # MariaDB — chatroom and conference state
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:11.4
    container_name: flexisip-mariadb
    restart: unless-stopped
    # Loopback-only publish: the conference server runs on host network and
    # reaches MariaDB at 127.0.0.1:3306. Not exposed to the Internet.
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=flexisip
      - MARIADB_DATABASE=flexisip_conference
      - MARIADB_USER=flexisip_conference
      - MARIADB_PASSWORD=flexisip
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — registrar backend for the proxy
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flexisip-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    # Loopback-only publish: the proxy runs on host network and reaches Redis
    # at 127.0.0.1:6379. Redis has no auth password, so we bind to loopback
    # (not 0.0.0.0) to avoid exposing it to the Internet.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # coturn — TURN/STUN relay for NAT traversal
  # ---------------------------------------------------------------------------
  coturn:
    image: coturn/coturn:4.6
    container_name: flexisip-coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n
      --log-file=stdout
      --realm=${TURN_REALM:-sip.example.com}
      --listening-port=3478
      --relay-ip=0.0.0.0
      --external-ip=${TURN_PUBLIC_IP}
      --min-port=49152
      --max-port=49200
      --fingerprint
      --lt-cred-mech
      --user=${TURN_USER:-turnuser}:${TURN_PASSWORD:-turnpw-CHANGEME}
      --no-tls
      --no-dtls
    healthcheck:
      # UDP check on the STUN/TURN listener.
      test: ["CMD-SHELL", "nc -z -u 127.0.0.1 3478"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Use host network so TURN can bind the relay port range directly.

volumes:
  mariadb_data:
  redis_data:
  proxy_data:
  conference_data:
  flexisip_certs:
